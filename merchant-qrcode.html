<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户二维码 - 多商户电商系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0 30px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 { font-size: 20px; font-weight: 600; }

        .header-nav { display: flex; gap: 20px; }
        .header-nav a { color: white; text-decoration: none; font-size: 14px; opacity: 0.9; }
        .header-nav a:hover { opacity: 1; }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 30px;
        }

        .page-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 6px;
        }

        .page-subtitle {
            font-size: 13px;
            color: #999;
            margin-bottom: 24px;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .toolbar {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .search-box input {
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 6px 0 0 6px;
            font-size: 13px;
            width: 280px;
            outline: none;
        }

        .search-box input:focus { border-color: #667eea; }

        .search-box button {
            padding: 8px 16px;
            border: 1px solid #667eea;
            background: #667eea;
            color: white;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            font-size: 13px;
        }

        .search-box button:hover { background: #5a6fd6; }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }

        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }

        .btn-outline { background: white; border: 1px solid #ddd; color: #555; }
        .btn-outline:hover { border-color: #667eea; color: #667eea; }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #fafbfc;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            color: #666;
            font-weight: 500;
            border-bottom: 2px solid #eee;
            white-space: nowrap;
        }

        table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: #333;
            white-space: nowrap;
        }

        table tbody tr:hover td { background: #fafbfc; }

        .merchant-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .merchant-logo {
            width: 40px; height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .merchant-name { font-weight: 500; }

        .toggle-switch {
            position: relative;
            width: 44px; height: 24px;
            display: inline-block;
        }

        .toggle-switch input { display: none; }

        .toggle-switch .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.25s;
        }

        .toggle-switch .slider::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            left: 2px; top: 2px;
            background: white;
            border-radius: 50%;
            transition: transform 0.25s;
        }

        .toggle-switch input:checked + .slider { background: #10b981; }
        .toggle-switch input:checked + .slider::after { transform: translateX(20px); }

        .toggle-label {
            font-size: 12px;
            margin-left: 6px;
            vertical-align: middle;
            color: #999;
        }

        .action-btns {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            padding: 4px 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: #555;
            transition: all 0.2s;
        }

        .action-btn:hover { border-color: #667eea; color: #667eea; }
        .action-btn.primary { background: #667eea; color: white; border-color: #667eea; }
        .action-btn.primary:hover { background: #5a6fd6; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-top: 1px solid #f0f0f0;
        }

        .pagination-info { font-size: 13px; color: #999; }

        .pagination-btns { display: flex; gap: 6px; }

        .pagination-btns button {
            width: 36px; height: 36px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .pagination-btns button:hover { border-color: #667eea; color: #667eea; }
        .pagination-btns button.active {
            background: #667eea; color: white; border-color: #667eea;
        }
        .pagination-btns button:disabled { opacity: 0.4; cursor: not-allowed; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }

        .modal-overlay.show { opacity: 1; pointer-events: auto; }

        .modal {
            background: white;
            border-radius: 12px;
            width: 480px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal.wide { width: 900px; }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 { font-size: 17px; color: #333; }

        .modal-close {
            width: 32px; height: 32px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover { background: #e8e8e8; }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .qr-display {
            text-align: center;
            padding: 20px;
        }

        .qr-image {
            width: 200px; height: 200px;
            margin: 0 auto 20px;
            background: #f5f5f5;
            border: 1px dashed #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            position: relative;
        }

        .qr-image::after {
            content: 'H';
            position: absolute;
            font-size: 40px;
            color: #333;
            font-weight: 700;
        }

        .qr-info {
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .qr-sub {
            font-size: 12px;
            color: #999;
            margin-bottom: 16px;
        }

        .qr-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .house-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #eef2ff;
            color: #667eea;
        }

        .house-tag.unauth {
            background: #fee2e2;
            color: #dc2626;
        }

        .amount-positive { color: #333; font-weight: 500; }
        .amount-gold { color: #d97706; font-weight: 500; }

        .status-on {
            color: #059669;
            font-size: 12px;
        }

        .status-off {
            color: #ccc;
            font-size: 12px;
        }

        .toast {
            position: fixed;
            top: 20px; right: 20px;
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .toast.show { transform: translateX(0); }

        @media (max-width: 768px) {
            .main-container { padding: 16px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-box input { width: 100%; }
            .modal, .modal.wide { width: 95%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>📱 商户二维码管理</h1>
        <nav class="header-nav">
            <a href="index.html">← 返回目录</a>
        </nav>
    </header>

    <div class="main-container">
        <h2 class="page-title">商户二维码</h2>
        <p class="page-subtitle">管理商户收款二维码与查看付款记录</p>

        <div class="section-card">
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="输入商户名称搜索..." onkeyup="if(event.key==='Enter')searchMerchant()">
                    <button onclick="searchMerchant()">搜索</button>
                </div>
            </div>

            <div class="table-wrap">
                <table id="merchantTable">
                    <thead>
                        <tr>
                            <th style="width:70px;">ID</th>
                            <th>商户信息</th>
                            <th style="width:80px;">联系人</th>
                            <th style="width:130px;">联系电话</th>
                            <th style="width:100px;">二维码状态</th>
                            <th style="width:100px;">启用状态</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination">
                <div class="pagination-info" id="pageInfo">共 0 条记录</div>
                <div class="pagination-btns" id="pageBtns"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="qrModal">
        <div class="modal">
            <div class="modal-header">
                <h3>收款二维码</h3>
                <button class="modal-close" onclick="closeModal('qrModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="qr-display">
                    <div class="qr-image"></div>
                    <div class="qr-info" id="qrMerchantName"></div>
                    <div class="qr-sub">扫码即可向该商户付款</div>
                    <div class="qr-actions">
                        <button class="btn btn-primary" onclick="downloadQR()">⬇ 下载二维码</button>
                        <button class="btn btn-outline" onclick="closeModal('qrModal')">关闭</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="paymentModal">
        <div class="modal wide">
            <div class="modal-header">
                <h3>付款记录 - <span id="paymentMerchantName"></span></h3>
                <button class="modal-close" onclick="closeModal('paymentModal')">×</button>
            </div>
            <div class="modal-body" style="padding: 0;">
                <div style="padding:12px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <input type="text" id="paymentSearch" placeholder="搜索用户名称/手机号..." style="padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;width:180px;outline:none;" onkeyup="if(event.key==='Enter')filterPayments()">
                    <input type="date" id="paymentStartDate" style="padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;outline:none;" title="开始日期">
                    <span style="font-size:12px;color:#999;">至</span>
                    <input type="date" id="paymentEndDate" style="padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;outline:none;" title="结束日期">
                    <button class="btn btn-primary" onclick="filterPayments()" style="padding:5px 14px;font-size:12px;">查询</button>
                    <button class="btn btn-success" onclick="exportPaymentRecords()" style="padding:5px 14px;font-size:12px;">⬇ 导出</button>
                </div>
                <table id="paymentTable">
                    <thead>
                        <tr>
                            <th>用户名称</th>
                            <th>手机号</th>
                            <th>付款金额</th>
                            <th>房屋认证</th>
                            <th>奖励物业金</th>
                            <th>付款时间</th>
                        </tr>
                    </thead>
                    <tbody id="paymentTableBody"></tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('paymentModal')">关闭</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

        var mockPayments = [

            { userName: '赵明', phone: '136****4444', amount: 450.00, house: '未认证', gold: '无', time: '2026-06-10 12:30:22' },
            { userName: '周婷', phone: '135****5555', amount: 2200.00, house: '碧桂园-三期-2栋-3单元-20层-2001号', gold: 22.00, time: '2026-06-10 11:15:40' },

            { userName: '陈美玲', phone: '133****7777', amount: 666.00, house: '绿城玫瑰园-一期-4栋-1单元-15层-1504号', gold: 6.66, time: '2026-06-10 09:58:12' },

            { userName: '吴志强', phone: '131****9999', amount: 3899.00, house: '翡翠湾-一期-5栋-1单元-8层-802号', gold: 38.99, time: '2026-06-09 18:35:10' },
            { userName: '郑大明', phone: '130****0000', amount: 520.00, house: '阳光花园-三期-2栋-1单元-18层-1805号', gold: 5.20, time: '2026-06-09 17:12:44' },

        var currentQrMerchant = null;
        var currentPaymentMerchant = null;

        function renderTable() {
            var keyword = currentKeyword.toLowerCase();
            var filtered = mockMerchants.filter(function(m) {
                return !keyword || m.name.toLowerCase().indexOf(keyword) !== -1;
            });

            var totalPages = Math.ceil(filtered.length / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            var start = (currentPage - 1) * pageSize;
            var pageData = filtered.slice(start, start + pageSize);

            var tbody = document.getElementById('tableBody');
            tbody.innerHTML = pageData.map(function(m) {
                return '<tr>' +
                    '<td>' + m.id + '</td>' +
                    '<td><div class="merchant-cell"><div class="merchant-logo">' + m.logo + '</div><span class="merchant-name">' + m.name + '</span></div></td>' +
                    '<td>' + m.contact + '</td>' +
                    '<td>' + m.phone + '</td>' +
                    '<td><label class="toggle-switch"><input type="checkbox" ' + (m.qrOn ? 'checked' : '') + ' onchange="toggleQR(\'' + m.id + '\', this)"><span class="slider"></span></label><span class="toggle-label">' + (m.qrOn ? '已开启' : '已关闭') + '</span></td>' +
                    '<td><label class="toggle-switch"><input type="checkbox" ' + (m.enabled ? 'checked' : '') + ' onchange="toggleEnable(\'' + m.id + '\', this)"><span class="slider"></span></label><span class="toggle-label">' + (m.enabled ? '已启用' : '已停用') + '</span></td>' +

                        '<button class="action-btn primary" onclick="viewQR(\'' + m.id + '\')">查看二维码</button>' +
                        '<button class="action-btn" onclick="viewPayments(\'' + m.id + '\')">查看付款记录</button>' +
                    '</div></td>' +
                '</tr>';
            }).join('');

            document.getElementById('pageInfo').textContent = '共 ' + filtered.length + ' 条记录';

            var btns = document.getElementById('pageBtns');
            var html = '';
            html += '<button ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goPage(' + (currentPage - 1) + ')">◀</button>';
            var sp = Math.max(1, currentPage - 2);
            var ep = Math.min(totalPages, currentPage + 2);
            for (var p = sp; p <= ep; p++) {
                html += '<button class="' + (p === currentPage ? 'active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
            }
            html += '<button ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="goPage(' + (currentPage + 1) + ')">▶</button>';
            btns.innerHTML = html;
        }

        function goPage(p) {
            currentPage = p;
            renderTable();
        }

        function searchMerchant() {
            currentKeyword = document.getElementById('searchInput').value.trim();
            currentPage = 1;
            renderTable();
        }

        function toggleQR(id, checkbox) {
            var merchant = mockMerchants.find(function(m) { return m.id === id; });
            if (merchant) {
                merchant.qrOn = checkbox.checked;
                showToast('商户【' + merchant.name + '】二维码已' + (checkbox.checked ? '开启' : '关闭'));
            }
        }

        function toggleEnable(id, checkbox) {
            var merchant = mockMerchants.find(function(m) { return m.id === id; });
            if (merchant) {
                merchant.enabled = checkbox.checked;
                showToast('商户【' + merchant.name + '】已' + (checkbox.checked ? '启用' : '停用'));
            }
        }

        function viewQR(id) {
            var merchant = mockMerchants.find(function(m) { return m.id === id; });
            if (!merchant) return;
            currentQrMerchant = merchant;
            document.getElementById('qrMerchantName').textContent = merchant.name + '（ID:' + merchant.id + '）';
            document.getElementById('qrModal').classList.add('show');
        }

        function downloadQR() {
            if (!currentQrMerchant) return;
            var canvas = document.createElement('canvas');
            canvas.width = 200; canvas.height = 200;
            var ctx = canvas.getContext('2d');

            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 0, 200, 200);

            var size = 120; var x = 40; var y = 40;
            for (var i = 0; i < size; i += 8) {
                for (var j = 0; j < size; j += 8) {
                    if (Math.random() > 0.55 || (i > 20 && i < 100 && j > 20 && j < 100 && Math.random() > 0.3)) {
                        ctx.fillStyle = '#333';
                        ctx.fillRect(x + i, y + j, 7, 7);
                    }
                }
            }

            ctx.fillStyle = '#333';
            ctx.font = 'bold 28px sans-serif';
            ctx.fillText(currentQrMerchant.logo, 86, 106);

            var url = canvas.toDataURL('image/png');
            var link = document.createElement('a');
            link.href = url;
            link.download = '商户二维码_' + currentQrMerchant.name + '.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('二维码已下载！');
        }

        function viewPayments(id) {
            var merchant = mockMerchants.find(function(m) { return m.id === id; });
            if (!merchant) return;
            currentPaymentMerchant = merchant;
            document.getElementById('paymentMerchantName').textContent = merchant.name;

            document.getElementById('paymentSearch').value = '';
            document.getElementById('paymentStartDate').value = '';
            document.getElementById('paymentEndDate').value = '';

            document.getElementById('paymentModal').classList.add('show');
            filterPayments();
        }

        function filterPayments() {
            var keyword = (document.getElementById('paymentSearch').value || '').toLowerCase().trim();
            var startDate = document.getElementById('paymentStartDate').value;
            var endDate = document.getElementById('paymentEndDate').value;

            var filtered = mockPayments.slice().sort(function(a, b) {
                return b.time.localeCompare(a.time);
            });

            if (keyword) {
                filtered = filtered.filter(function(p) {
                    return p.userName.toLowerCase().indexOf(keyword) !== -1 ||
                           p.phone.indexOf(keyword) !== -1;
                });
            }

            if (startDate) {
                filtered = filtered.filter(function(p) {
                    return p.time >= startDate;
                });
            }

            if (endDate) {
                var endNext = endDate + ' 23:59:59';
                filtered = filtered.filter(function(p) {
                    return p.time <= endNext;
                });
            }

            window._paymentFiltered = filtered;

            var tbody = document.getElementById('paymentTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#ccc;">暂无匹配的付款记录</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(function(p) {
                var houseHtml;
                if (p.house === '未认证') {
                    houseHtml = '<span class="house-tag unauth">未认证</span>';
                } else {
                    houseHtml = '<span class="house-tag">' + p.house + '</span>';
                }

                var goldHtml;
                if (p.gold === '无') {
                    goldHtml = '<span style="color:#ccc;">无</span>';
                } else {
                    goldHtml = '<span class="amount-gold">¥' + p.gold.toFixed(2) + '</span>';
                }

                return '<tr>' +
                    '<td>' + p.userName + '</td>' +
                    '<td>' + p.phone + '</td>' +
                    '<td class="amount-positive">¥' + p.amount.toFixed(2) + '</td>' +
                    '<td>' + houseHtml + '</td>' +
                    '<td>' + goldHtml + '</td>' +
                    '<td>' + p.time + '</td>' +
                '</tr>';
            }).join('');
        }

        function exportPaymentRecords() {
            var csv = '\uFEFF用户名称,手机号,付款金额,房屋认证,奖励物业金,付款时间\n';
            var data = window._paymentFiltered || mockPayments;
            var sorted = data.slice().sort(function(a, b) { return b.time.localeCompare(a.time); });
            sorted.forEach(function(p) {
                var gold = p.gold === '无' ? '' : p.gold;
                csv += p.userName + ',' + p.phone + ',' + p.amount + ',' + (p.house || '未认证') + ',' + gold + ',' + p.time + '\n';
            });

            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = '付款记录_' + (currentPaymentMerchant ? currentPaymentMerchant.name : '') + '.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('付款记录导出成功！');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            toast.textContent = '✓ ' + msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal('qrModal');
        });

        document.getElementById('paymentModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal('paymentModal');
        });

        renderTable();
    </script>
</body>
</html>
