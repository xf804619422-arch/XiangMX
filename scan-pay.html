<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码付款 - 微信小程序</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #e8ecf1;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 30px 20px;
        }

        .phone-frame {
            width: 420px;
            min-height: 780px;
            background: #f5f6f8;
            border-radius: 32px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.18);
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            height: 44px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 12px;
            color: #333;
            font-weight: 600;
        }

        .nav-bar {
            height: 48px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-back {
            position: absolute;
            left: 12px;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            font-size: 18px;
            color: #333;
        }

        .nav-back:hover { background: #f0f0f0; }

        .nav-title { font-size: 16px; font-weight: 600; color: #333; }

        .page-content {
            height: calc(780px - 92px);
            overflow-y: auto;
            padding: 20px;
        }

        .merchant-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .merchant-logo {
            width: 52px; height: 52px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
        }

        .merchant-info { flex: 1; min-width: 0; }
        .merchant-name { font-size: 15px; font-weight: 600; color: #333; }
        .merchant-tip { font-size: 12px; color: #999; margin-top: 4px; }

        .section-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .section-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .amount-input-row {
            display: flex;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
            transition: border-color 0.2s;
        }

        .amount-input-row.focused { border-color: #667eea; }

        .amount-input-row .currency {
            font-size: 28px;
            color: #333;
            font-weight: 600;
            margin-right: 6px;
        }

        .amount-input-row input {
            flex: 1;
            border: none;
            font-size: 36px;
            font-weight: 700;
            color: #333;
            outline: none;
            background: transparent;
            width: 100%;
        }

        .amount-input-row input::placeholder { color: #ddd; }

        .reward-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: #fffbeb;
            border-radius: 8px;
            border: 1px solid #fde68a;
            margin-top: 14px;
        }

        .reward-row .reward-label {
            font-size: 13px;
            color: #92400e;
        }

        .reward-row .reward-value {
            font-size: 14px;
            font-weight: 600;
            color: #d97706;
        }

        .house-info-block {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #f0f9ff;
            border-radius: 10px;
            border: 1px solid #bae6fd;
        }

        .house-info-block.unauth {
            background: #fffbf0;
            border-color: #fde68a;
        }

        .house-detail {
            flex: 1;
            min-width: 0;
        }

        .house-detail .house-label {
            font-size: 12px;
            color: #999;
        }

        .house-detail .house-address {
            font-size: 13px;
            color: #333;
            font-weight: 500;
            margin-top: 3px;
            word-break: break-all;
        }

        .house-detail .unauth-text {
            font-size: 13px;
            color: #f59e0b;
            font-weight: 500;
        }

        .house-cert-link {
            font-size: 12px;
            color: #667eea;
            cursor: pointer;
            white-space: nowrap;
            margin-left: 8px;
            text-decoration: none;
        }

        .house-cert-link:hover { text-decoration: underline; }

        .pay-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        .pay-btn:hover { opacity: 0.95; }
        .pay-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .simulate-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .simulate-bar span { opacity: 0.9; }
        .simulate-bar button {
            padding: 3px 10px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            color: white;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }

        .simulate-bar button:hover { background: rgba(255,255,255,0.25); }
        .simulate-bar button.active { background: white; color: #ef4444; font-weight: 600; }

        .success-overlay {
            position: absolute;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }

        .success-overlay.show { opacity: 1; pointer-events: auto; }

        .success-icon {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: #d1fae5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #059669;
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .success-amount {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .success-detail {
            font-size: 13px;
            color: #999;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.8;
        }

        .success-reward {
            padding: 10px 18px;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 8px;
            font-size: 13px;
            color: #d97706;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .success-home-btn {
            padding: 14px 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .success-home-btn:hover { opacity: 0.9; }

        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            white-space: nowrap;
        }

        .toast.show { transform: translate(-50%, -50%) scale(1); }

        @media (max-width: 460px) {
            .phone-frame { width: 100%; border-radius: 0; min-height: 100vh; }
            body { padding: 0; }
            .page-content { height: calc(100vh - 92px); }
        }
    </style>
</head>
<body>
    <div class="phone-frame" style="position: relative;">
        <div class="toast" id="toast"></div>

        <div class="status-bar">
            <span>9:41</span>
            <span style="font-size:11px;">WiFi ▮▮▮ ●●●●○</span>
        </div>

        <div class="nav-bar">
            <div class="nav-back" onclick="window.location.href='index.html'">&#x2039;</div>
            <span class="nav-title">向商家付款</span>
        </div>

        <div class="page-content">
            <div class="simulate-bar" id="simulateBar">
                <span>原型演示：</span>
                <button id="simCertBtn" class="active" onclick="setCertified(true)">已认证房屋</button>
                <button id="simUncertBtn" onclick="setCertified(false)">未认证房屋</button>
            </div>

            <div class="merchant-card">
                <div class="merchant-logo">H</div>
                <div class="merchant-info">
                    <div class="merchant-name">华为旗舰店</div>
                    <div class="merchant-tip">扫码付款</div>
                </div>
            </div>

            <div class="section-card">
                <div class="section-label">付款金额</div>
                <div class="amount-input-row" id="amountRow">
                    <span class="currency">¥</span>
                    <input type="text" id="amountInput" placeholder="0.00" onfocus="focusAmount()" onblur="blurAmount()" oninput="onAmountInput()">
                </div>
                <div class="reward-row" id="rewardRow">
                    <span class="reward-label">赠送物业金</span>
                    <span class="reward-value" id="rewardValue">¥0.00</span>
                </div>
            </div>

            <div class="section-card" id="houseSection">
                <div class="section-label">房屋认证信息</div>
                <div id="houseInfoContent"></div>
            </div>

            <button class="pay-btn" id="payBtn" onclick="doPay()">确认付款</button>
        </div>

        <div class="success-overlay" id="successOverlay">
            <div class="success-icon">&#10003;</div>
            <div class="success-title">付款成功</div>
            <div class="success-amount" id="successAmount">¥0.00</div>
            <div class="success-detail" id="successDetail"></div>
            <div class="success-reward" id="successReward" style="display:none;"></div>
            <a class="success-home-btn" href="index.html">回到首页</a>
        </div>
    </div>

    <script>
        var isCertified = true;
        var houseData = {
            community: '阳光花园',
            phase: '一期',
            building: '1栋',
            unit: '2单元',
            floor: '5层',
            room: '501号'
        };

        function setCertified(val) {
            isCertified = val;
            document.getElementById('simCertBtn').className = val ? 'active' : '';
            document.getElementById('simUncertBtn').className = val ? '' : 'active';
            renderHouseInfo();
        }

        function renderHouseInfo() {
            var container = document.getElementById('houseInfoContent');
            if (isCertified) {
                var addr = houseData.community + ' - ' + houseData.phase + ' - ' + houseData.building + ' - ' + houseData.unit + ' - ' + houseData.floor + ' - ' + houseData.room;
                container.innerHTML =
                    '<div class="house-info-block">' +
                        '<div class="house-detail">' +
                            '<div class="house-label">已认证</div>' +
                            '<div class="house-address">' + addr + '</div>' +
                        '</div>' +
                    '</div>';
            } else {
                container.innerHTML =
                    '<div class="house-info-block unauth">' +
                        '<div class="house-detail">' +
                            '<div class="unauth-text">当前未认证房屋信息</div>' +
                        '</div>' +
                        '<a class="house-cert-link" href="my-house.html" onclick="event.stopPropagation()">去认证 &#x203A;</a>' +
                    '</div>';
            }
        }

        function focusAmount() {
            document.getElementById('amountRow').classList.add('focused');
        }

        function blurAmount() {
            document.getElementById('amountRow').classList.remove('focused');
        }

        function onAmountInput() {
            var input = document.getElementById('amountInput');
            var val = input.value;
            val = val.replace(/[^\d.]/g, '');
            var parts = val.split('.');
            if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
            if (parts.length === 2 && parts[1].length > 2) val = parts[0] + '.' + parts[1].substring(0, 2);
            input.value = val;

            var amount = parseFloat(val);
            var rewardValue = document.getElementById('rewardValue');
            if (amount && amount > 0) {
                rewardValue.textContent = '¥' + (amount * 0.1).toFixed(2);
            } else {
                rewardValue.textContent = '¥0.00';
            }
        }

        function doPay() {
            var amount = parseFloat(document.getElementById('amountInput').value);
            if (!amount || amount <= 0) {
                showToast('请输入有效付款金额');
                return;
            }

            var payBtn = document.getElementById('payBtn');
            payBtn.disabled = true;
            payBtn.textContent = '处理中...';

            setTimeout(function() {
                document.getElementById('successAmount').textContent = '¥' + amount.toFixed(2);

                var detail = '向 华为旗舰店 付款';
                document.getElementById('successDetail').textContent = detail;

                var rewardEl = document.getElementById('successReward');
                if (isCertified) {
                    rewardEl.textContent = '赠送物业金 ¥' + (amount * 0.1).toFixed(2);
                    rewardEl.style.display = 'block';
                } else {
                    rewardEl.style.display = 'none';
                }

                document.getElementById('successOverlay').classList.add('show');
            }, 1500);
        }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }

        renderHouseInfo();
    </script>
</body>
</html>
