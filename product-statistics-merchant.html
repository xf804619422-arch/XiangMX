<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品统计 - 商家管理端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 { font-size: 20px; font-weight: 600; }

        .header-nav { display: flex; gap: 20px; }

        .header-nav a {
            color: white; text-decoration: none; font-size: 14px; opacity: 0.9;
        }

        .header-nav a:hover { opacity: 1; }

        .content-area {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 6px;
        }

        .page-subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 28px;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .section-title {
            font-size: 16px;
            color: #333;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-tabs {
            display: flex;
            background: #f0f2f5;
            border-radius: 8px;
            padding: 3px;
        }

        .time-tab {
            padding: 7px 18px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .time-tab.active {
            background: white;
            color: #667eea;
            font-weight: 500;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .time-range {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-range input[type="date"] {
            padding: 7px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
        }

        .time-range input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .time-range span { color: #999; font-size: 13px; }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: #fafbfc;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #eef0f4;
            transition: box-shadow 0.2s;
        }

        .stat-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }

        .stat-card .stat-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        .stat-card .stat-compare {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        .stat-card .stat-compare.up { color: #10b981; }
        .stat-card .stat-compare.down { color: #ef4444; }

        .rank-tabs {
            display: flex;
            gap: 4px;
            background: #f0f2f5;
            border-radius: 8px;
            padding: 3px;
        }

        .rank-tab {
            padding: 7px 16px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .rank-tab.active {
            background: white;
            color: #667eea;
            font-weight: 500;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .rank-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover { opacity: 0.9; }

        .product-table {
            width: 100%;
            border-collapse: collapse;
        }

        .product-table th {
            background: #fafbfc;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            color: #666;
            font-weight: 500;
            border-bottom: 2px solid #eee;
        }

        .product-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #333;
        }

        .product-table tbody tr:hover td {
            background: #fafbfc;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-img {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background: linear-gradient(135deg, #e8ecf4, #dce1ed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .product-name {
            font-weight: 500;
            color: #333;
            margin-bottom: 2px;
        }

        .product-merchant {
            font-size: 12px;
            color: #999;
        }

        .rank-num {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
        }

        .rank-1 { background: #fff3e0; color: #e65100; }
        .rank-2 { background: #f3f5f7; color: #6c7a8d; }
        .rank-3 { background: #fdf2e0; color: #b7791f; }
        .rank-other { color: #999; }

        .sale-amount { color: #e74c3c; font-weight: 500; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .pagination button {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .pagination button:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination .page-info {
            font-size: 13px;
            color: #999;
            margin: 0 8px;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        @media (max-width: 768px) {
            .content-area { padding: 16px; }
            .stat-cards { grid-template-columns: repeat(2, 1fr); }
            .section-header { flex-direction: column; align-items: flex-start; }
            .product-table { font-size: 12px; }
            .product-table th, .product-table td { padding: 10px 8px; }
        }
    </style>
</head>
<body>

        <h1>📊 商家管理端</h1>
        <nav class="header-nav">

            </div>

            <div class="stat-cards">
                <div class="stat-card">
                    <div class="stat-label">新增商品数</div>
                    <div class="stat-value" id="newProducts">1,286</div>

                </div>
                <div class="stat-card">
                    <div class="stat-label">商品收藏数</div>
                    <div class="stat-value" id="favorites">8,452</div>
                    <div class="stat-compare up">较上周期 +8.3%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">交易总件数</div>
                    <div class="stat-value" id="totalOrders">3,921</div>
                    <div class="stat-compare down">较上周期 -2.1%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">交易成功数</div>
                    <div class="stat-value" id="successOrders">3,518</div>
                    <div class="stat-compare up">较上周期 +5.7%</div>
                </div>
            </div>
        </div>

        <div class="section-card" id="rankingSection">
            <div class="section-header">
                <div class="section-title">🏆 商品排行</div>
                <div class="rank-controls">
                    <div class="rank-tabs" id="rankTabs">
                        <button class="rank-tab active" data-rank="favorites" onclick="switchRankType('favorites')">收藏数量</button>
                        <button class="rank-tab" data-rank="amount" onclick="switchRankType('amount')">销售额</button>
                        <button class="rank-tab" data-rank="volume" onclick="switchRankType('volume')">销量</button>
                    </div>
                    <div class="time-range">
                        <input type="date" id="rankStartDate">
                        <span>至</span>
                        <input type="date" id="rankEndDate">
                        <button class="btn btn-primary" onclick="loadRankingData()">查询</button>
                    </div>
                </div>
            </div>

            <table class="product-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">排名</th>
                        <th>商品信息</th>
                        <th style="width: 100px;" id="rankCol1">收藏数量</th>
                        <th style="width: 100px;" id="rankCol2">销量</th>
                        <th style="width: 120px;" id="rankCol3">销售额</th>
                    </tr>
                </thead>
                <tbody id="productTableBody"></tbody>
            </table>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>

        function initDates() {
            var now = new Date();
            var firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
            var lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);

            document.getElementById('rankStartDate').value = formatDate(firstDay);
            document.getElementById('rankEndDate').value = formatDate(lastDay);

            var sevenDaysAgo = new Date(now.getTime() - 7 * 86400000);
            document.getElementById('overviewStartDate').value = formatDate(sevenDaysAgo);
            document.getElementById('overviewEndDate').value = formatDate(now);
        }

        function formatDate(date) {
            var y = date.getFullYear();
            var m = String(date.getMonth() + 1).padStart(2, '0');
            var d = String(date.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + d;
        }

        function switchOverviewTime(range) {
            overviewTimeRange = range;

            var tabs = document.querySelectorAll('#overviewTimeTabs .time-tab');
            tabs.forEach(function(tab) {
                tab.classList.remove('active');
                if (tab.dataset.range === range) {
                    tab.classList.add('active');
                }
            });

            var customRange = document.getElementById('overviewCustomRange');
            if (range === 'custom') {
                customRange.style.display = 'flex';
            } else {
                customRange.style.display = 'none';
                loadOverviewData();
            }
        }

        function loadOverviewData() {
            var newProducts = overviewTimeRange === '7d' ? 1286 : (overviewTimeRange === '30d' ? 5230 : 892);
            var favorites = overviewTimeRange === '7d' ? 8452 : (overviewTimeRange === '30d' ? 32180 : 5678);
            var totalOrders = overviewTimeRange === '7d' ? 3921 : (overviewTimeRange === '30d' ? 15678 : 2890);
            var successOrders = overviewTimeRange === '7d' ? 3518 : (overviewTimeRange === '30d' ? 14056 : 2601);

            animateNumber('newProducts', newProducts);
            animateNumber('favorites', favorites);
            animateNumber('totalOrders', totalOrders);
            animateNumber('successOrders', successOrders);
        }

        function animateNumber(elementId, target) {
            var el = document.getElementById(elementId);
            var current = parseInt(el.textContent.replace(/,/g, '')) || 0;
            var step = Math.ceil(Math.abs(target - current) / 30);
            var timer = setInterval(function() {
                if (Math.abs(current - target) <= step) {
                    current = target;
                    el.textContent = current.toLocaleString();
                    clearInterval(timer);
                } else {
                    current += current < target ? step : -step;
                    el.textContent = current.toLocaleString();
                }
            }, 20);
        }

        function switchRankType(type) {
            rankType = type;
            var tabs = document.querySelectorAll('#rankTabs .rank-tab');
            tabs.forEach(function(tab) {
                tab.classList.remove('active');
                if (tab.dataset.rank === type) {
                    tab.classList.add('active');
                }
            });
            currentPage = 1;
            updateTableHeaders();
            loadRankingData();
        }

        function updateTableHeaders() {
            var col1 = document.getElementById('rankCol1');
            var col2 = document.getElementById('rankCol2');
            var col3 = document.getElementById('rankCol3');

            if (rankType === 'favorites') {
                col1.textContent = '收藏数量';
                col1.style.fontWeight = '700';
                col1.style.color = '#667eea';
                col2.textContent = '销量';
                col2.style.fontWeight = '500';
                col2.style.color = '#666';
                col3.textContent = '销售额';
                col3.style.fontWeight = '500';
                col3.style.color = '#666';
            } else if (rankType === 'amount') {
                col2.textContent = '销量';
                col2.style.fontWeight = '500';
                col2.style.color = '#666';
                col3.textContent = '销售额';
                col3.style.fontWeight = '700';
                col3.style.color = '#667eea';
                col1.textContent = '收藏数量';
                col1.style.fontWeight = '500';
                col1.style.color = '#666';
            } else {
                col2.textContent = '销量';
                col2.style.fontWeight = '700';
                col2.style.color = '#667eea';
                col1.textContent = '收藏数量';
                col1.style.fontWeight = '500';
                col1.style.color = '#666';
                col3.textContent = '销售额';
                col3.style.fontWeight = '500';
                col3.style.color = '#666';
            }
        }

        function loadRankingData() {
            totalPages = Math.ceil(mockProducts.length / pageSize);

            var sorted = mockProducts.slice();
            if (rankType === 'favorites') {
                sorted.sort(function(a, b) { return b.favorites - a.favorites; });
            } else if (rankType === 'amount') {
                sorted.sort(function(a, b) { return b.amount - a.amount; });
            } else {
                sorted.sort(function(a, b) { return b.sales - a.sales; });
            }

            var start = (currentPage - 1) * pageSize;
            var pageData = sorted.slice(start, start + pageSize);

            var tbody = document.getElementById('productTableBody');
            tbody.innerHTML = pageData.map(function(product, idx) {
                var rank = start + idx + 1;
                var rankClass = rank === 1 ? 'rank-1' : (rank === 2 ? 'rank-2' : (rank === 3 ? 'rank-3' : 'rank-other'));
                var rankDisplay = rank <= 3 ? rank : rank;

                return '<tr>' +
                    '<td><div class="rank-num ' + rankClass + '">' + rankDisplay + '</div></td>' +
                    '<td>' +
                        '<div class="product-info">' +
                            '<div class="product-img">📦</div>' +
                            '<div>' +
                                '<div class="product-name">' + product.name + '</div>' +
                            '</div>' +
                        '</div>' +
                    '</td>' +
                    '<td>' + product.favorites.toLocaleString() + '</td>' +
                    '<td>' + product.sales.toLocaleString() + '</td>' +
                    '<td><span class="sale-amount">¥' + (product.amount / 10000).toFixed(2) + '万</span></td>' +
                '</tr>';
            }).join('');

            renderPagination();
        }

        function renderPagination() {
            var pagination = document.getElementById('pagination');
            var html = '';

            html += '<button ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage - 1) + ')">◀</button>';

            var startPage = Math.max(1, currentPage - 2);
            var endPage = Math.min(totalPages, currentPage + 2);

            for (var i = startPage; i <= endPage; i++) {
                html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="goToPage(' + i + ')">' + i + '</button>';
            }

            html += '<button ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage + 1) + ')">▶</button>';
            html += '<span class="page-info">共 ' + totalPages + ' 页</span>';

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadRankingData();
        }

        initDates();
        loadOverviewData();
        loadRankingData();
    </script>
</body>
</html>
