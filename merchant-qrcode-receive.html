<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码收款 - 商家管理端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0 30px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 { font-size: 20px; font-weight: 600; }

        .header-nav { display: flex; gap: 20px; }
        .header-nav a { color: white; text-decoration: none; font-size: 14px; opacity: 0.9; }
        .header-nav a:hover { opacity: 1; }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 30px;
        }

        .page-title { font-size: 22px; color: #333; margin-bottom: 6px; }
        .page-subtitle { font-size: 13px; color: #999; margin-bottom: 24px; }

        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .qr-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .qr-header .qr-icon {
            width: 56px; height: 56px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .qr-header .qr-info { flex: 1; }
        .qr-header .qr-info .qr-title { font-size: 16px; font-weight: 600; color: #333; }
        .qr-header .qr-info .qr-desc { font-size: 12px; color: #999; margin-top: 4px; }
        .qr-header .qr-status { font-size: 13px; margin-right: 8px; }

        .toggle-switch {
            position: relative;
            width: 44px; height: 24px;
            display: inline-block;
            vertical-align: middle;
        }

        .toggle-switch input { display: none; }

        .toggle-switch .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.25s;
        }

        .toggle-switch .slider::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            left: 2px; top: 2px;
            background: white;
            border-radius: 50%;
            transition: transform 0.25s;
        }

        .toggle-switch input:checked + .slider { background: #10b981; }
        .toggle-switch input:checked + .slider::after { transform: translateX(20px); }

        .status-text { font-size: 13px; margin-left: 8px; }
        .status-text.on { color: #059669; }
        .status-text.off { color: #ccc; }

        .toolbar {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar input[type="text"] {
            padding: 7px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            width: 200px;
            outline: none;
        }

        .toolbar input[type="text"]:focus { border-color: #667eea; }

        .toolbar input[type="date"] {
            padding: 7px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        .toolbar input[type="date"]:focus { border-color: #667eea; }

        .toolbar .sep { font-size: 12px; color: #999; }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }

        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }

        .btn-outline { background: white; border: 1px solid #ddd; color: #555; }
        .btn-outline:hover { border-color: #667eea; color: #667eea; }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #fafbfc;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            color: #666;
            font-weight: 500;
            border-bottom: 2px solid #eee;
            white-space: nowrap;
        }

        table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: #333;
            white-space: nowrap;
        }

        table tbody tr:hover td { background: #fafbfc; }

        .house-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #eef2ff;
            color: #667eea;
        }

        .house-tag.unauth {
            background: #fee2e2;
            color: #dc2626;
        }

        .amount-positive { color: #333; font-weight: 500; }
        .amount-gold { color: #d97706; font-weight: 500; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-top: 1px solid #f0f0f0;
        }

        .pagination-info { font-size: 13px; color: #999; }

        .pagination-btns { display: flex; gap: 6px; }

        .pagination-btns button {
            width: 36px; height: 36px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .pagination-btns button:hover { border-color: #667eea; color: #667eea; }
        .pagination-btns button.active {
            background: #667eea; color: white; border-color: #667eea;
        }
        .pagination-btns button:disabled { opacity: 0.4; cursor: not-allowed; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }

        .modal-overlay.show { opacity: 1; pointer-events: auto; }

        .modal {
            background: white;
            border-radius: 12px;
            width: 480px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 { font-size: 17px; color: #333; }

        .modal-close {
            width: 32px; height: 32px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover { background: #e8e8e8; }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .qr-display { text-align: center; padding: 20px; }

        .qr-image {
            width: 200px; height: 200px;
            margin: 0 auto 20px;
            background: #f5f5f5;
            border: 1px dashed #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .qr-image .qr-letter {
            font-size: 40px;
            color: #333;
            font-weight: 700;
        }

        .qr-info { font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 500; }
        .qr-sub { font-size: 12px; color: #999; margin-bottom: 16px; }

        .qr-actions { display: flex; gap: 10px; justify-content: center; }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #ccc;
            font-size: 14px;
        }

        .toast {
            position: fixed;
            top: 20px; right: 20px;
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .toast.show { transform: translateX(0); }

        @media (max-width: 768px) {
            .main-container { padding: 16px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar input[type="text"] { width: 100%; }
            .qr-header { flex-direction: column; align-items: flex-start; }
            .modal { width: 95%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>📱 商家管理端</h1>
        <nav class="header-nav">
            <a href="index.html">← 返回目录</a>
            <a href="product-statistics-merchant.html">商品统计</a>
            <a href="finance-statistics-merchant.html">财务统计</a>
            <a href="merchant-qrcode-receive.html">二维码收款</a>
        </nav>
    </header>

    <div class="main-container">
        <h2 class="page-title">二维码收款</h2>
        <p class="page-subtitle">管理收款二维码，查看用户付款记录</p>

        <div class="section-card">
            <div class="qr-header">
                <div class="qr-icon">H</div>
                <div class="qr-info">
                    <div class="qr-title">收款二维码</div>
                    <div class="qr-desc">顾客扫码即可向你付款，已认证的住户可累积物业金奖励</div>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span class="status-text on" id="qrStatusText">已开启</span>
                    <button class="btn btn-primary" onclick="openQrModal()">查看二维码</button>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="搜索用户名称/手机号..." onkeyup="if(event.key==='Enter')searchPayments()">
                <input type="date" id="startDate" title="开始日期">
                <span class="sep">至</span>
                <input type="date" id="endDate" title="结束日期">
                <button class="btn btn-primary" onclick="searchPayments()">查询</button>
                <button class="btn btn-success" onclick="exportPayments()">⬇ 导出</button>
            </div>

            <div class="table-wrap">
                <table id="paymentTable">
                    <thead>
                        <tr>
                            <th>用户名称</th>
                            <th>手机号</th>
                            <th>付款金额</th>
                            <th>房屋认证</th>
                            <th>奖励物业金</th>
                            <th>付款时间</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination">
                <div class="pagination-info" id="pageInfo">共 0 条记录</div>
                <div class="pagination-btns" id="pageBtns"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="qrModal">
        <div class="modal">
            <div class="modal-header">
                <h3>收款二维码</h3>
                <button class="modal-close" onclick="closeModal('qrModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="qr-display">
                    <div class="qr-image">
                        <span class="qr-letter">H</span>
                    </div>
                    <div class="qr-info">华为旗舰店 收款码</div>
                    <div class="qr-sub">二维码状态：<span id="modalQrStatus" style="color:#059669;">已开启</span></div>
                    <div class="qr-actions">
                        <button class="btn btn-primary" onclick="downloadQR()">⬇ 下载二维码</button>
                        <button class="btn btn-outline" onclick="closeModal('qrModal')">关闭</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        var qrEnabled = true;
        var currentPage = 1;
        var pageSize = 10;
        var currentKeyword = '';
        var currentStartDate = '';
        var currentEndDate = '';

        var mockPayments = [
            { userName: '张伟', phone: '138****1111', amount: 299.00, house: '阳光花园-一期-1栋-1单元-5层-501号', gold: 2.99, time: '2026-06-15 14:23:15' },
            { userName: '李娜', phone: '139****2222', amount: 1599.00, house: '翡翠湾-二期-3栋-2单元-12层-1201号', gold: 15.99, time: '2026-06-15 14:20:30' },
            { userName: '王强', phone: '137****3333', amount: 89.00, house: '阳光花园-一期-1栋-1单元-5层-501号', gold: 0.89, time: '2026-06-15 13:45:08' },
            { userName: '赵明', phone: '136****4444', amount: 450.00, house: '未认证', gold: '无', time: '2026-06-15 12:30:22' },
            { userName: '周婷', phone: '135****5555', amount: 2200.00, house: '碧桂园-三期-2栋-3单元-20层-2001号', gold: 22.00, time: '2026-06-14 18:15:40' },
            { userName: '刘建国', phone: '134****6666', amount: 128.00, house: '未认证', gold: '无', time: '2026-06-14 16:42:55' },
            { userName: '陈美玲', phone: '133****7777', amount: 666.00, house: '绿城玫瑰园-一期-4栋-1单元-15层-1504号', gold: 6.66, time: '2026-06-14 14:58:12' },
            { userName: '孙杰', phone: '132****8888', amount: 88.00, house: '未认证', gold: '无', time: '2026-06-14 11:20:30' },
            { userName: '吴志强', phone: '131****9999', amount: 3899.00, house: '翡翠湾-一期-5栋-1单元-8层-802号', gold: 38.99, time: '2026-06-13 20:35:10' },
            { userName: '郑大明', phone: '130****0000', amount: 520.00, house: '阳光花园-三期-2栋-1单元-18层-1805号', gold: 5.20, time: '2026-06-13 17:12:44' },
            { userName: '黄丽', phone: '129****1111', amount: 99.00, house: '未认证', gold: '无', time: '2026-06-13 15:05:33' },
            { userName: '冯军', phone: '128****2222', amount: 1888.00, house: '碧桂园-一期-3栋-2单元-14层-1403号', gold: 18.88, time: '2026-06-13 14:55:07' },
            { userName: '钱丽华', phone: '127****3333', amount: 355.00, house: '未认证', gold: '无', time: '2026-06-12 11:30:22' },
            { userName: '林家豪', phone: '126****4444', amount: 750.00, house: '绿城玫瑰园-一期-4栋-1单元-15层-1504号', gold: 7.50, time: '2026-06-12 09:18:45' },
            { userName: '赵晓明', phone: '136****3456', amount: 1200.00, house: '阳光花园-一期-2栋-1单元-8层-801号', gold: 12.00, time: '2026-06-11 18:42:15' },
            { userName: '孙建国', phone: '158****7890', amount: 66.00, house: '未认证', gold: '无', time: '2026-06-11 16:10:30' },
            { userName: '周文斌', phone: '137****2345', amount: 289.00, house: '翡翠湾-二期-3栋-2单元-10层-1003号', gold: 2.89, time: '2026-06-11 14:25:08' },
            { userName: '韩雪', phone: '125****5555', amount: 1999.00, house: '未认证', gold: '无', time: '2026-06-10 20:35:22' },
            { userName: '马超', phone: '124****6666', amount: 428.00, house: '碧桂园-三期-2栋-3单元-20层-2001号', gold: 4.28, time: '2026-06-10 12:18:40' }
        ];

        function getFilteredData() {
            var filtered = mockPayments.slice().sort(function(a, b) {
                return b.time.localeCompare(a.time);
            });

            if (currentKeyword) {
                var kw = currentKeyword.toLowerCase();
                filtered = filtered.filter(function(p) {
                    return p.userName.toLowerCase().indexOf(kw) !== -1 ||
                           p.phone.indexOf(kw) !== -1;
                });
            }

            if (currentStartDate) {
                filtered = filtered.filter(function(p) {
                    return p.time >= currentStartDate;
                });
            }

            if (currentEndDate) {
                var endNext = currentEndDate + ' 23:59:59';
                filtered = filtered.filter(function(p) {
                    return p.time <= endNext;
                });
            }

            return filtered;
        }

        function renderTable() {
            var filtered = getFilteredData();
            var totalPages = Math.ceil(filtered.length / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            var start = (currentPage - 1) * pageSize;
            var pageData = filtered.slice(start, start + pageSize);

            var tbody = document.getElementById('tableBody');
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无匹配的付款记录</td></tr>';
            } else {
                tbody.innerHTML = pageData.map(function(p) {
                    var houseHtml;
                    if (p.house === '未认证') {
                        houseHtml = '<span class="house-tag unauth">未认证</span>';
                    } else {
                        houseHtml = '<span class="house-tag">' + p.house + '</span>';
                    }

                    var goldHtml;
                    if (p.gold === '无') {
                        goldHtml = '<span style="color:#ccc;">无</span>';
                    } else {
                        goldHtml = '<span class="amount-gold">¥' + p.gold.toFixed(2) + '</span>';
                    }

                    return '<tr>' +
                        '<td>' + p.userName + '</td>' +
                        '<td>' + p.phone + '</td>' +
                        '<td class="amount-positive">¥' + p.amount.toFixed(2) + '</td>' +
                        '<td>' + houseHtml + '</td>' +
                        '<td>' + goldHtml + '</td>' +
                        '<td>' + p.time + '</td>' +
                    '</tr>';
                }).join('');
            }

            document.getElementById('pageInfo').textContent = '共 ' + filtered.length + ' 条记录';

            var btns = document.getElementById('pageBtns');
            var html = '';
            html += '<button ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goPage(' + (currentPage - 1) + ')">◀</button>';
            var sp = Math.max(1, currentPage - 2);
            var ep = Math.min(totalPages, currentPage + 2);
            for (var p = sp; p <= ep; p++) {
                html += '<button class="' + (p === currentPage ? 'active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
            }
            html += '<button ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="goPage(' + (currentPage + 1) + ')">▶</button>';
            btns.innerHTML = html;
        }

        function goPage(p) {
            currentPage = p;
            renderTable();
        }

        function searchPayments() {
            currentKeyword = document.getElementById('searchInput').value.trim();
            currentStartDate = document.getElementById('startDate').value;
            currentEndDate = document.getElementById('endDate').value;
            currentPage = 1;
            renderTable();
        }

        function toggleQrStatus() {
            var checkbox = document.getElementById('qrToggle');
            qrEnabled = checkbox.checked;
            var text = document.getElementById('qrStatusText');
            if (qrEnabled) {
                text.textContent = '已开启';
                text.className = 'status-text on';
            } else {
                text.textContent = '已关闭';
                text.className = 'status-text off';
            }
            document.getElementById('modalQrStatus').textContent = qrEnabled ? '已开启' : '已关闭';
            document.getElementById('modalQrStatus').style.color = qrEnabled ? '#059669' : '#ccc';
            showToast('收款二维码已' + (qrEnabled ? '开启' : '关闭'));
        }

        function openQrModal() {
            document.getElementById('modalQrStatus').textContent = qrEnabled ? '已开启' : '已关闭';
            document.getElementById('modalQrStatus').style.color = qrEnabled ? '#059669' : '#ccc';
            document.getElementById('qrModal').classList.add('show');
        }

        function downloadQR() {
            var canvas = document.createElement('canvas');
            canvas.width = 200; canvas.height = 200;
            var ctx = canvas.getContext('2d');

            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 0, 200, 200);

            var size = 120; var x = 40; var y = 40;
            for (var i = 0; i < size; i += 8) {
                for (var j = 0; j < size; j += 8) {
                    if (Math.random() > 0.55 || (i > 20 && i < 100 && j > 20 && j < 100 && Math.random() > 0.3)) {
                        ctx.fillStyle = '#333';
                        ctx.fillRect(x + i, y + j, 7, 7);
                    }
                }
            }

            ctx.fillStyle = '#333';
            ctx.font = 'bold 28px sans-serif';
            ctx.fillText('H', 86, 106);

            var url = canvas.toDataURL('image/png');
            var link = document.createElement('a');
            link.href = url;
            link.download = '收款二维码.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('二维码已下载！');
        }

        function exportPayments() {
            var data = getFilteredData();
            var csv = '\uFEFF用户名称,手机号,付款金额,房屋认证,奖励物业金,付款时间\n';
            data.forEach(function(p) {
                var gold = p.gold === '无' ? '' : p.gold;
                csv += p.userName + ',' + p.phone + ',' + p.amount + ',' + (p.house || '未认证') + ',' + gold + ',' + p.time + '\n';
            });

            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = '收款记录.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('收款记录导出成功！');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            toast.textContent = '✓ ' + msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal('qrModal');
        });

        renderTable();
    </script>
</body>
</html>
