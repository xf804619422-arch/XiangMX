<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物业金支付 - 微信小程序</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #e8ecf1;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 30px 20px;
        }

        .phone-frame {
            width: 420px;
            min-height: 780px;
            background: #f5f6f8;
            border-radius: 32px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.18);
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            height: 44px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 12px;
            color: #333;
            font-weight: 600;
        }

        .nav-bar {
            height: 48px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-back {
            position: absolute;
            left: 12px;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            font-size: 18px;
            color: #333;
        }

        .nav-back:hover { background: #f0f0f0; }

        .nav-title { font-size: 16px; font-weight: 600; color: #333; }

        .page-content {
            height: calc(780px - 92px);
            overflow-y: auto;
            padding: 20px;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .section-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .house-info-block {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #f0f9ff;
            border-radius: 10px;
            border: 1px solid #bae6fd;
        }

        .house-info-block .house-icon {
            width: 40px; height: 40px;
            border-radius: 8px;
            background: #dbeafe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #3b82f6;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .house-detail { flex: 1; min-width: 0; }
        .house-detail .house-address {
            font-size: 14px;
            color: #333;
            font-weight: 500;
            word-break: break-all;
        }
        .house-detail .house-cert-label {
            font-size: 11px;
            color: #059669;
            margin-top: 3px;
        }

        .house-unauth-block {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 16px;
            background: #fffbf0;
            border-radius: 10px;
            border: 1px solid #fde68a;
        }

        .house-unauth-block .unauth-text {
            font-size: 14px;
            color: #f59e0b;
            font-weight: 500;
        }

        .house-cert-link {
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
            white-space: nowrap;
            margin-left: 8px;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 14px;
            border: 1px solid #667eea;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .house-cert-link:hover {
            background: #667eea;
            color: white;
        }

        .balance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: linear-gradient(135deg, #f0f9ff, #ecfdf5);
            border-radius: 10px;
            border: 1px solid #d1fae5;
        }

        .balance-label {
            font-size: 14px;
            color: #666;
        }

        .balance-value {
            font-size: 22px;
            font-weight: 700;
            color: #059669;
        }

        .amount-input-row {
            display: flex;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
            transition: border-color 0.2s;
        }

        .amount-input-row.focused { border-color: #667eea; }

        .amount-input-row .currency {
            font-size: 28px;
            color: #333;
            font-weight: 600;
            margin-right: 6px;
        }

        .amount-input-row input {
            flex: 1;
            border: none;
            font-size: 36px;
            font-weight: 700;
            color: #333;
            outline: none;
            background: transparent;
            width: 100%;
        }

        .amount-input-row input::placeholder { color: #ddd; }

        .pay-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        .pay-btn:hover { opacity: 0.95; }
        .pay-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .simulate-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            border-radius: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .simulate-bar span { opacity: 0.9; }
        .simulate-bar button {
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            color: white;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }

        .simulate-bar button:hover { background: rgba(255,255,255,0.25); }
        .simulate-bar button.active { background: white; color: #ef4444; font-weight: 600; }

        .success-overlay {
            position: absolute;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }

        .success-overlay.show { opacity: 1; pointer-events: auto; }

        .success-icon {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: #d1fae5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #059669;
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .success-amount {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .success-detail {
            font-size: 13px;
            color: #999;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.8;
        }

        .success-balance {
            padding: 10px 18px;
            background: #ecfdf5;
            border: 1px solid #d1fae5;
            border-radius: 8px;
            font-size: 13px;
            color: #059669;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .success-home-btn {
            padding: 14px 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .success-home-btn:hover { opacity: 0.9; }

        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            white-space: nowrap;
        }

        .toast.show { transform: translate(-50%, -50%) scale(1); }

        @media (max-width: 460px) {
            .phone-frame { width: 100%; border-radius: 0; min-height: 100vh; }
            body { padding: 0; }
            .page-content { height: calc(100vh - 92px); }
        }
    </style>
</head>
<body>
    <div class="phone-frame" style="position: relative;">
        <div class="toast" id="toast"></div>

        <div class="status-bar">
            <span>9:41</span>
            <span style="font-size:11px;">WiFi ▮▮▮ ●●●●○</span>
        </div>

        <div class="nav-bar">
            <div class="nav-back" onclick="window.location.href='index.html'">&#x2039;</div>
            <span class="nav-title">物业金支付</span>
        </div>

        <div class="page-content" id="pageContent">
            <div class="simulate-bar" id="simulateBar">
                <span>原型演示：</span>
                <button id="simCertBtn" class="active" onclick="setCertified(true)">已认证</button>
                <button id="simUncertBtn" onclick="setCertified(false)">未认证</button>
            </div>

            <div id="certifiedView">
                <div class="section-card">
                    <div class="section-label">认证房屋</div>
                    <div class="house-info-block">
                        <div class="house-icon">&#x2302;</div>
                        <div class="house-detail">
                            <div class="house-address" id="houseAddress">阳光花园 - 一期 - 1栋 - 2单元 - 5层 - 501号</div>
                            <div class="house-cert-label">已认证</div>
                        </div>
                    </div>
                </div>

                <div class="section-card">
                    <div class="section-label">物业金余额</div>
                    <div class="balance-row">
                        <span class="balance-label">当前余额</span>
                        <span class="balance-value" id="balanceDisplay">¥12,580.00</span>
                    </div>
                </div>

                <div class="section-card">
                    <div class="section-label">支付金额</div>
                    <div class="amount-input-row" id="amountRow">
                        <span class="currency">¥</span>
                        <input type="text" id="amountInput" placeholder="0.00" onfocus="focusAmount()" onblur="blurAmount()" oninput="onAmountInput()">
                    </div>
                </div>

                <button class="pay-btn" id="payBtn" onclick="doPay()">确认支付</button>
            </div>

            <div id="uncertifiedView" style="display:none;">
                <div class="section-card">
                    <div class="section-label">房屋认证</div>
                    <div class="house-unauth-block">
                        <span class="unauth-text">当前未认证房屋信息，请先认证</span>
                        <a class="house-cert-link" href="my-house.html">去认证</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="success-overlay" id="successOverlay">
            <div class="success-icon">&#10003;</div>
            <div class="success-title">支付成功</div>
            <div class="success-amount" id="successAmount">¥0.00</div>
            <div class="success-detail" id="successDetail"></div>
            <div class="success-balance" id="successBalance"></div>
            <a class="success-home-btn" href="index.html">返回首页</a>
        </div>
    </div>

    <script>
        var isCertified = true;
        var currentBalance = 12580.00;

        var houseData = {
            community: '阳光花园',
            phase: '一期',
            building: '1栋',
            unit: '2单元',
            floor: '5层',
            room: '501号'
        };

        function setCertified(val) {
            isCertified = val;
            document.getElementById('simCertBtn').className = val ? 'active' : '';
            document.getElementById('simUncertBtn').className = val ? '' : 'active';
            renderView();
        }

        function renderView() {
            if (isCertified) {
                document.getElementById('certifiedView').style.display = 'block';
                document.getElementById('uncertifiedView').style.display = 'none';
                document.getElementById('payBtn').style.display = 'block';
                var addr = houseData.community + ' - ' + houseData.phase + ' - ' + houseData.building + ' - ' + houseData.unit + ' - ' + houseData.floor + ' - ' + houseData.room;
                document.getElementById('houseAddress').textContent = addr;
                document.getElementById('balanceDisplay').textContent = '¥' + currentBalance.toLocaleString('zh-CN', { minimumFractionDigits: 2 });
            } else {
                document.getElementById('certifiedView').style.display = 'none';
                document.getElementById('uncertifiedView').style.display = 'block';
                document.getElementById('payBtn').style.display = 'none';
            }
        }

        function focusAmount() {
            document.getElementById('amountRow').classList.add('focused');
        }

        function blurAmount() {
            document.getElementById('amountRow').classList.remove('focused');
        }

        function onAmountInput() {
            var input = document.getElementById('amountInput');
            var val = input.value;
            val = val.replace(/[^\d.]/g, '');
            var parts = val.split('.');
            if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
            if (parts.length === 2 && parts[1].length > 2) val = parts[0] + '.' + parts[1].substring(0, 2);
            input.value = val;
        }

        function doPay() {
            var amount = parseFloat(document.getElementById('amountInput').value);
            if (!amount || amount <= 0) {
                showToast('请输入有效支付金额');
                return;
            }
            if (amount > currentBalance) {
                showToast('物业金余额不足');
                return;
            }

            var payBtn = document.getElementById('payBtn');
            payBtn.disabled = true;
            payBtn.textContent = '处理中...';

            var self = this;
            setTimeout(function() {
                currentBalance -= amount;
                document.getElementById('successAmount').textContent = '¥' + amount.toFixed(2);
                document.getElementById('successDetail').textContent = '物业金支付 · ' + houseData.community;
                document.getElementById('successBalance').textContent = '剩余物业金余额 ¥' + currentBalance.toLocaleString('zh-CN', { minimumFractionDigits: 2 });
                document.getElementById('successOverlay').classList.add('show');
            }, 1500);
        }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }

        renderView();
    </script>
</body>
</html>
