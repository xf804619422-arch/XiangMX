<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务统计 - 商家管理端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 { font-size: 20px; font-weight: 600; }

        .header-nav { display: flex; gap: 20px; }

        .header-nav a { color: white; text-decoration: none; font-size: 14px; opacity: 0.9; }
        .header-nav a:hover { opacity: 1; }

        .content-area {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-title { font-size: 22px; color: #333; margin-bottom: 6px; }
        .page-subtitle { font-size: 14px; color: #999; margin-bottom: 28px; }

        .tab-nav {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 2px solid #e8ecf1;
        }

        .tab-nav-item {
            padding: 12px 28px;
            border: none;
            background: none;
            font-size: 15px;
            color: #888;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            font-weight: 500;
        }

        .tab-nav-item:hover { color: #555; }

        .tab-nav-item.active {
            color: #667eea;
        }

        .tab-nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .section-card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .section-title {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: #fafbfc;
            border-radius: 10px;
            padding: 24px;
            border: 1px solid #eef0f4;
            transition: box-shadow 0.2s;
        }

        .stat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

        .stat-card .stat-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-card .stat-value {
            font-size: 30px;
            font-weight: 700;
            color: #333;
        }

        .stat-card .stat-compare { font-size: 12px; margin-top: 8px; }
        .stat-card .stat-compare.up { color: #10b981; }
        .stat-card .stat-compare.down { color: #ef4444; }

        .time-range {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-range input[type="date"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
        }

        .time-range input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .time-range span { color: #999; font-size: 13px; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-box input {
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 6px 0 0 6px;
            font-size: 13px;
            width: 240px;
        }

        .search-box input:focus { outline: none; border-color: #667eea; }

        .search-box button {
            padding: 8px 16px;
            border: 1px solid #667eea;
            background: #667eea;
            color: white;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            font-size: 13px;
        }

        .search-box button:hover { background: #5a6fd6; }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
            background: white;
            cursor: pointer;
            min-width: 140px;
        }

        .filter-select:focus { outline: none; border-color: #667eea; }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-outline {
            border: 1px solid #ddd;
            background: white;
            color: #555;
        }

        .btn-outline:hover { border-color: #667eea; color: #667eea; }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover { background: #059669; }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: #fafbfc;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            color: #666;
            font-weight: 500;
            border-bottom: 2px solid #eee;
            white-space: nowrap;
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #333;
        }

        .data-table tbody tr:hover td { background: #fafbfc; }

        .rank-num {
            width: 28px; height: 28px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
        }

        .rank-1 { background: #fff3e0; color: #e65100; }
        .rank-2 { background: #f3f5f7; color: #6c7a8d; }
        .rank-3 { background: #fdf2e0; color: #b7791f; }
        .rank-other { color: #999; }

        .amount-positive { color: #333; font-weight: 500; }
        .amount-negative { color: #ef4444; font-weight: 500; }

        .merchant-type-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-personal { background: #e8f4fd; color: #3b82f6; }
        .tag-enterprise { background: #fef3e2; color: #f59e0b; }
        .tag-flagship { background: #fce7f3; color: #ec4899; }

        .pay-method-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-wechat { background: #e8fdf0; color: #10b981; }
        .tag-balance { background: #e8f4fd; color: #3b82f6; }
        .tag-gold { background: #fef3e2; color: #f59e0b; }

        .product-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-img {
            width: 48px; height: 48px;
            border-radius: 6px;
            background: linear-gradient(135deg, #e8ecf4, #dce1ed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .product-name { font-weight: 500; color: #333; }
        .product-name-sub { font-size: 12px; color: #999; margin-top: 2px; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .pagination-btns {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pagination-btns button {
            width: 36px; height: 36px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .pagination-btns button:hover { border-color: #667eea; color: #667eea; }
        .pagination-btns button.active {
            background: #667eea; color: white; border-color: #667eea;
        }
        .pagination-btns button:disabled { opacity: 0.4; cursor: not-allowed; }

        .pagination-info { font-size: 13px; color: #999; }

        .toast {
            position: fixed;
            top: 20px; right: 20px;
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .toast.show { transform: translateX(0); }

        @media (max-width: 768px) {
            .content-area { padding: 16px; }
            .stat-cards { grid-template-columns: 1fr; }
            .section-header { flex-direction: column; align-items: flex-start; }
            .toolbar { flex-direction: column; align-items: flex-start; }
            .data-table { font-size: 12px; }
            .data-table th, .data-table td { padding: 10px 8px; }
            .tab-nav-item { padding: 10px 16px; font-size: 14px; }
        }
    </style>
</head>

                    <div class="toolbar">
                        <div class="search-box">

                        </div>
                        <select class="filter-select" id="salesSupplierFilter" onchange="loadSalesData()">
                            <option value="">全部供应商</option>
                        </select>
                        <select class="filter-select" id="salesPayMethodFilter" onchange="loadSalesData()">

                            <option value="balance">余额支付</option>
                            <option value="gold">物业金支付</option>
                        </select>
                        <div class="time-range">
                            <input type="date" id="salesStartDate">
                            <span>至</span>
                            <input type="date" id="salesEndDate">
                            <button class="btn btn-primary" onclick="loadSalesData()">查询</button>
                        </div>
                        <button class="btn btn-success" onclick="exportTable('sales')">导出数据</button>
                    </div>
                </div>

                <table class="data-table" id="salesTable">

                </table>

                    <div class="pagination-btns" id="salesPageBtns"></div>
                </div>
            </div>
        </div>

        function formatDate(d) {
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }

        function initDates() {
            var now = new Date();
            var firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
            var lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            var fd = formatDate(firstDay);
            var ld = formatDate(lastDay);

            document.getElementById('overviewStartDate').value = fd;
            document.getElementById('overviewEndDate').value = ld;
            document.getElementById('salesStartDate').value = fd;
            document.getElementById('salesEndDate').value = ld;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-nav-item').forEach(function(t) {
                t.classList.remove('active');
                if (t.dataset.tab === tab) t.classList.add('active');
            });
            document.querySelectorAll('.tab-content').forEach(function(c) {
                c.classList.remove('active');
            });
            document.getElementById('tab-' + tab).classList.add('active');

            if (tab === 'sales') loadSalesData();
        }

        function animateNumber(elId, target) {
            var el = document.getElementById(elId);
            var raw = el.textContent.replace(/[^0-9.]/g, '');
            var current = parseFloat(raw) || 0;
            var step = Math.ceil(Math.abs(target - current) / 30);
            var timer = setInterval(function() {
                if (Math.abs(current - target) <= step) {
                    current = target;
                    el.textContent = '¥' + current.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                    clearInterval(timer);
                } else {
                    current += current < target ? step : -step;
                    el.textContent = '¥' + current.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                }
            }, 20);
        }

        function loadOverviewData() {
            animateNumber('netRevenue', 8562300);
            animateNumber('payAmount', 9218500);
            animateNumber('refundAmount', 656200);
        }

        function loadMerchantData() {
            var sorted = mockMerchants.slice();
            sorted.sort(function(a, b) { return b.revenue - a.revenue; });

            var totalPages = Math.ceil(sorted.length / merchantPageSize);
            var start = (merchantPage - 1) * merchantPageSize;
            var pageData = sorted.slice(start, start + merchantPageSize);

            var tbody = document.getElementById('merchantTableBody');
            tbody.innerHTML = pageData.map(function(m, i) {
                var rank = start + i + 1;
                var rankCls = rank === 1 ? 'rank-1' : (rank === 2 ? 'rank-2' : (rank === 3 ? 'rank-3' : 'rank-other'));
                var typeCls = m.type === 'enterprise' ? 'tag-enterprise' : (m.type === 'flagship' ? 'tag-flagship' : 'tag-personal');
                var typeLabel = m.type === 'enterprise' ? '企业商户' : (m.type === 'flagship' ? '品牌旗舰' : '个人商户');

                return '<tr>' +
                    '<td><span class="rank-num ' + rankCls + '">' + rank + '</span></td>' +
                    '<td>' + m.id + '</td>' +
                    '<td>' + m.name + '</td>' +
                    '<td><span class="merchant-type-tag ' + typeCls + '">' + typeLabel + '</span></td>' +
                    '<td class="amount-positive">¥' + m.revenue.toLocaleString() + '</td>' +
                    '<td>¥' + m.payAmount.toLocaleString() + '</td>' +
                    '<td class="amount-negative">¥' + m.refundAmount.toLocaleString() + '</td>' +
                '</tr>';
            }).join('');

            document.getElementById('merchantPageInfo').textContent = '共 ' + sorted.length + ' 条记录';

            var btns = document.getElementById('merchantPageBtns');
            var html = '';
            html += '<button ' + (merchantPage === 1 ? 'disabled' : '') + ' onclick="merchantPage=' + (merchantPage - 1) + ';loadMerchantData()">◀</button>';
            var sp = Math.max(1, merchantPage - 2);
            var ep = Math.min(totalPages, merchantPage + 2);
            for (var p = sp; p <= ep; p++) {
                html += '<button class="' + (p === merchantPage ? 'active' : '') + '" onclick="merchantPage=' + p + ';loadMerchantData()">' + p + '</button>';
            }
            html += '<button ' + (merchantPage === totalPages ? 'disabled' : '') + ' onclick="merchantPage=' + (merchantPage + 1) + ';loadMerchantData()">▶</button>';
            btns.innerHTML = html;
        }

        function loadSalesData() {
            var keyword = (document.getElementById('salesSearch').value || '').toLowerCase().trim();
            var supplierFilter = document.getElementById('salesSupplierFilter').value;
            var payMethodFilter = document.getElementById('salesPayMethodFilter').value;
            var filtered = mockSales.slice();

            if (keyword) {
                filtered = filtered.filter(function(s) {
                    return s.name.toLowerCase().indexOf(keyword) !== -1;
                });
            }

            if (supplierFilter) {
                filtered = filtered.filter(function(s) {
                    return s.supplier === supplierFilter;
                });
            }

            if (payMethodFilter) {
                filtered = filtered.filter(function(s) {
                    return s.payMethod === payMethodFilter;
                });
            }

            filtered.sort(function(a, b) {
                return b.time.localeCompare(a.time);
            });

            var totalPages = Math.ceil(filtered.length / salesPageSize);
            if (salesPage > totalPages) salesPage = 1;
            var start = (salesPage - 1) * salesPageSize;
            var pageData = filtered.slice(start, start + salesPageSize);

            var payMethodLabels = { wechat: '微信支付', balance: '余额支付', gold: '物业金支付' };
            var payMethodClasses = { wechat: 'tag-wechat', balance: 'tag-balance', gold: 'tag-gold' };

            var tbody = document.getElementById('salesTableBody');
            tbody.innerHTML = pageData.map(function(s) {
                return '<tr>' +
                    '<td><div class="product-info"><div class="product-img">📦</div></div></td>' +
                    '<td><div class="product-name">' + s.name + '</div></td>' +
                    '<td style="font-size:13px;color:#555;">' + s.supplier + '</td>' +
                    '<td>¥' + s.costPrice.toLocaleString() + '</td>' +
                    '<td>' + s.qty + '</td>' +
                    '<td>¥' + s.price.toLocaleString() + '</td>' +
                    '<td class="amount-positive">¥' + s.subtotal.toLocaleString() + '</td>' +
                    '<td><span class="pay-method-tag ' + (payMethodClasses[s.payMethod] || '') + '">' + (payMethodLabels[s.payMethod] || s.payMethod) + '</span></td>' +
                    '<td>' + s.time + '</td>' +
                '</tr>';
            }).join('');

            document.getElementById('salesPageInfo').textContent = '共 ' + filtered.length + ' 条记录';

            var btns = document.getElementById('salesPageBtns');
            var html = '';
            html += '<button ' + (salesPage === 1 ? 'disabled' : '') + ' onclick="salesPage=' + (salesPage - 1) + ';loadSalesData()">◀</button>';
            var sp = Math.max(1, salesPage - 2);
            var ep = Math.min(totalPages, salesPage + 2);
            for (var p = sp; p <= ep; p++) {
                html += '<button class="' + (p === salesPage ? 'active' : '') + '" onclick="salesPage=' + p + ';loadSalesData()">' + p + '</button>';
            }
            html += '<button ' + (salesPage === totalPages ? 'disabled' : '') + ' onclick="salesPage=' + (salesPage + 1) + ';loadSalesData()">▶</button>';
            btns.innerHTML = html;
        }

        function exportTable(type) {
            var toast = document.getElementById('toast');
            var msg = '销售明细导出成功！已生成 finance_sales_export.csv';
            toast.textContent = '✓ ' + msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

        function initSupplierFilter() {
            var suppliers = [];
            for (var i = 0; i < mockSales.length; i++) {
                if (suppliers.indexOf(mockSales[i].supplier) === -1) {
                    suppliers.push(mockSales[i].supplier);
                }
            }
            suppliers.sort();
            var select = document.getElementById('salesSupplierFilter');
            for (var s = 0; s < suppliers.length; s++) {
                var opt = document.createElement('option');
                opt.value = suppliers[s];
                opt.textContent = suppliers[s];
                select.appendChild(opt);
            }
        }

        initDates();
        initSupplierFilter();
        loadOverviewData();
    </script>
